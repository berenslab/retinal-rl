# This is a standard template for a wandb sweep.
# See: https://docs.wandb.ai/guides/sweeps/define-sweep-configuration
#
# Sweeps can be initialized with retinal-rl from the command line with:
#
# python main.py +experiment=vae-classification command=sweep +sweep=rescale-range-sweep

description: "Grid search over image_rescale_range for the vae-classification experiment."
program: main.py
method: grid
project: retinal-vae-classification # Project name from vae-classification.yaml

parameters:
  image_rescale_range:
    values:
      - [1, 1]      # Identity: No scaling
      - [0.8, 1.2]  # Scale up and down slightly
      # - [1, 2]      # default from vae-classification
      - [1, 4]      # Scale up significantly 

  # Ensure wandb is enabled for all sweep runs.
  logging.use_wandb:
    value: True